<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSW Power Outage Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>⚡ NSW Power Outage Checker</h1>

    <p>Enter an address to check power outage information.</p>

    <input 
        id="address" 
        type="text" 
        placeholder="Enter address e.g. 123 Smith Street Sydney NSW">

    <button onclick="checkOutages()">
        Check Outages
    </button>


    <div id="results">
        <h2>Results</h2>
        <p>Enter an address and click check.</p>
    </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/distributor.js"></script>
<script src="js/outage.js"></script>
<script src="js/app.js"></script>

</body>
</html>
